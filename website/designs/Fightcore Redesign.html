<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fightcore — Bowser: Koopa Klaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c11;
    --surface: #13131b;
    --surface2: #1a1a24;
    --surface3: #20202c;
    --border: #26263a;
    --border2: #32324a;
    --text: #dddde8;
    --text2: #9090aa;
    --text3: #5a5a72;
    --accent: oklch(63% 0.19 22);
    --accent-dim: oklch(63% 0.19 22 / 0.15);
    --accent-glow: oklch(63% 0.19 22 / 0.08);
    --teal: oklch(65% 0.14 195);
    --teal-dim: oklch(65% 0.14 195 / 0.15);
    --yellow: oklch(78% 0.16 80);
    --yellow-dim: oklch(78% 0.16 80 / 0.15);
    --startup-color: var(--yellow);
    --active-color: var(--accent);
    --recovery-color: #333348;
    --sidebar-w: 72px;
    --topbar-h: 48px;
    --font-ui: 'Space Grotesk', sans-serif;
    --font-data: 'JetBrains Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; line-height: 1.5; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  button { font-family: var(--font-ui); cursor: pointer; }
  a { color: var(--teal); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 16px; min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 12px; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--text2); }
  .tweak-toggle { display: flex; gap: 4px; }
  .tweak-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface3); color: var(--text2); font-size: 12px; transition: all 0.15s; }
  .tweak-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sidebarMode": "compact",
  "tableMode": "full"
}/*EDITMODE-END*/;

// ── Data ────────────────────────────────────────────────────────────────────
const CHARACTERS = [
  {id:'mario',name:'Mario',color:'#e83030'},{id:'fox',name:'Fox',color:'#c8a830'},
  {id:'cfal',name:'C. Falcon',color:'#e06820'},{id:'kirby',name:'Kirby',color:'#e870b8'},
  {id:'link',name:'Link',color:'#68a030'},{id:'pika',name:'Pikachu',color:'#e8d820'},
  {id:'dk',name:'Donkey Kong',color:'#a86020'},{id:'samus',name:'Samus',color:'#d88020'},
  {id:'yoshi',name:'Yoshi',color:'#50c850'},{id:'falco',name:'Falco',color:'#4080e0'},
  {id:'marth',name:'Marth',color:'#3060c0'},{id:'mew2',name:'Mewtwo',color:'#9060d0'},
  {id:'luigi',name:'Luigi',color:'#38a038'},{id:'bowser',name:'Bowser',color:'#c8920a',active:true},
  {id:'peach',name:'Peach',color:'#e860a0'},{id:'ics',name:'Ice Climbers',color:'#60b0e0'},
  {id:'sheik',name:'Sheik',color:'#607090'},{id:'zelda',name:'Zelda',color:'#e0a020'},
  {id:'drmario',name:'Dr. Mario',color:'#e06060'},{id:'pichu',name:'Pichu',color:'#d8c820'},
  {id:'yl',name:'Young Link',color:'#5a9828'},{id:'ganon',name:'Ganondorf',color:'#5020a0'},
  {id:'roy',name:'Roy',color:'#e04040'},{id:'jigglypuff',name:'Jigglypuff',color:'#e890b8'},
  {id:'mewtwo',name:'Mewtwo',color:'#9060d0'},{id:'gnw',name:'G&W',color:'#202020'},
];

const HITBOXES = [
  { group:'slash', id:'id1', label:'id1', color:'#5b8ee6', damage:10, angle:80, bkb:80, kbg:90, setkb:0, effect:'Slash', hitlagA:6, hitlagD:'6 (4 Crouched)', shield:5 },
  { group:'slash', id:'id2', label:'id2', color:'#e65b5b', damage:12, angle:80, bkb:80, kbg:90, setkb:0, effect:'Slash', hitlagA:7, hitlagD:'7 (4 Crouched)', shield:7 },
  { group:'late', id:'all', label:'All Hitboxes', color:null, damage:4, angle:60, bkb:0, kbg:0, setkb:0, effect:'Slash', hitlagA:4, hitlagD:'4 (2 Crouched)', shield:3 },
  { group:'fthrow', id:'all', label:'All Hitboxes', color:null, damage:11, angle:30, bkb:12, kbg:20, setkb:0, effect:'Normal', hitlagA:7, hitlagD:'7 (4 Crouched)', shield:6 },
  { group:'fthrow_hit', id:'all', label:'All Hitboxes', color:null, damage:4, angle:80, bkb:140, kbg:15, setkb:0, effect:'Slash', hitlagA:4, hitlagD:'4 (2 Crouched)', shield:3 },
  { group:'bthrow', id:'all', label:'All Hitboxes', color:null, damage:11, angle:361, bkb:62, kbg:98, setkb:0, effect:'Normal', hitlagA:7, hitlagD:'7 (4 Crouched)', shield:6 },
];

const GROUPS = ['slash','late','fthrow','fthrow_hit','bthrow'];
const GROUP_LABELS = {slash:'slash',late:'late',fthrow:'fthrow',fthrow_hit:'fthrow (hit)',bthrow:'bthrow'};
const TOTAL = 59;

// Hit windows: each defines a frame range, color, and label shown in legend + on cells
const HIT_WINDOWS = [
  { start: 16, end: 18, color: '#5b8ee6', label: 'slash · id1', damage: '10%' },
  { start: 16, end: 18, color: '#e65b5b', label: 'slash · id2', damage: '12%' },
  { start: 22, end: 24, color: '#9060d0', label: 'late',        damage: '4%'  },
  { start: 28, end: 30, color: '#e8a020', label: 'fthrow',      damage: '11%' },
  { start: 32, end: 34, color: '#50c878', label: 'bthrow',      damage: '11%' },
];

// For each frame, get the active windows (could be multiple)
function getWindowsForFrame(f) {
  return HIT_WINDOWS.filter(w => f >= w.start && f <= w.end);
}

// ── TopBar ──────────────────────────────────────────────────────────────────
function TopBar() {
  return (
    <header style={{height:'var(--topbar-h)',background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:16,padding:'0 16px',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="var(--accent)" strokeWidth="2"/>
          <path d="M7 11 L11 7 L15 11 L11 15Z" fill="var(--accent)"/>
          <circle cx="11" cy="11" r="2" fill="var(--bg)"/>
        </svg>
        <span style={{fontWeight:700,fontSize:15,letterSpacing:'-0.02em',color:'var(--text)'}}>FIGHTCORE</span>
      </div>
      <div style={{flex:1,maxWidth:360,position:'relative'}}>
        <svg style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',opacity:0.35}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search characters, moves…" style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px 6px 32px',color:'var(--text)',fontSize:13,fontFamily:'var(--font-ui)',outline:'none'}} onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:11,color:'var(--text3)',fontFamily:'var(--font-data)'}}>Ctrl K</span>
      </div>
      <nav style={{display:'flex',gap:4,marginLeft:'auto',flexShrink:0}}>
        {['Characters','Calculator','Discord','Credits'].map(n=>(
          <a key={n} style={{padding:'5px 10px',borderRadius:6,color:'var(--text2)',fontSize:13,display:'flex',alignItems:'center',gap:5}}>{n}</a>
        ))}
      </nav>
    </header>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({mode}) {
  const [active, setActive] = useState('bowser');
  if (mode === 'expanded') {
    return (
      <aside style={{width:180,background:'var(--surface)',borderRight:'1px solid var(--border)',overflow:'hidden auto',flexShrink:0}}>
        <div style={{padding:'10px 8px 4px',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text3)'}}>Characters</div>
        {CHARACTERS.map(c=>(
          <button key={c.id} onClick={()=>setActive(c.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'7px 12px',background:active===c.id?'var(--accent-dim)':'transparent',border:'none',borderLeft:`3px solid ${active===c.id?'var(--accent)':'transparent'}`,color:active===c.id?'var(--text)':'var(--text2)',fontSize:13,textAlign:'left',cursor:'pointer',transition:'all 0.1s'}}>
            <span style={{width:24,height:24,borderRadius:'50%',background:c.color+'22',border:`1.5px solid ${c.color}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:c.color,flexShrink:0}}>{c.name[0]}</span>
            {c.name}
          </button>
        ))}
      </aside>
    );
  }
  return (
    <aside style={{width:72,background:'var(--surface)',borderRight:'1px solid var(--border)',overflow:'hidden auto',flexShrink:0}}>
      <div style={{padding:'8px 4px',display:'flex',flexDirection:'column',gap:3}}>
        {CHARACTERS.map(c=>(
          <button key={c.id} title={c.name} onClick={()=>setActive(c.id)} style={{width:56,height:40,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:8,background:active===c.id?'var(--accent-dim)':'transparent',border:`1.5px solid ${active===c.id?'var(--accent)':'transparent'}`,cursor:'pointer',transition:'all 0.1s',position:'relative'}}>
            <span style={{fontSize:13,fontWeight:700,color:active===c.id?'var(--text)':c.color,fontFamily:'var(--font-data)'}}>{c.name.slice(0,2).toUpperCase()}</span>
            {c.id==='bowser'&&<span style={{position:'absolute',top:2,right:2,width:5,height:5,borderRadius:'50%',background:'var(--accent)'}}/>}
          </button>
        ))}
      </div>
    </aside>
  );
}

// ── Frame Scrubber ───────────────────────────────────────────────────────────
function FrameScrubber({frame, setFrame, playing, setPlaying, fps, setFps}) {
  const dragging = useRef(false);

  // Keyboard navigation
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); setFrame(f => Math.max(1, f-1)); }
      if (e.key === 'ArrowRight') { e.preventDefault(); setFrame(f => Math.min(TOTAL, f+1)); }
      if (e.key === ' ')          { e.preventDefault(); setPlaying(p => !p); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [setFrame, setPlaying]);

  const activeWindows = getWindowsForFrame(frame);
  // Deduplicate windows by label for display (overlapping same-frame hits)
  const uniqueWindows = HIT_WINDOWS.filter((w,i,arr)=>arr.findIndex(x=>x.label===w.label)===i);

  // For each frame cell: pick the primary color (first matching window), or neutral
  const getCellStyle = (f) => {
    const wins = getWindowsForFrame(f);
    const isCurrent = f === frame;
    if (wins.length === 0) {
      return {
        background: isCurrent ? '#8080a0' : '#1e1e2c',
        border: `1px solid ${isCurrent ? 'white' : '#2a2a3e'}`,
        boxShadow: isCurrent ? '0 0 6px rgba(128,128,160,0.4)' : 'none',
      };
    }
    // If multiple windows on this frame, split vertically
    if (wins.length >= 2) {
      return {
        background: `linear-gradient(to right, ${wins.map((w,i)=>`${w.color} ${i/wins.length*100}%, ${w.color} ${(i+1)/wins.length*100}%`).join(', ')})`,
        border: `1px solid ${isCurrent ? 'white' : wins[0].color+'66'}`,
        opacity: isCurrent ? 1 : 0.75,
        boxShadow: isCurrent ? `0 0 10px ${wins[0].color}88` : 'none',
      };
    }
    const w = wins[0];
    return {
      background: isCurrent ? w.color : w.color + 'aa',
      border: `1px solid ${isCurrent ? 'white' : w.color + '55'}`,
      boxShadow: isCurrent ? `0 0 10px ${w.color}88` : 'none',
    };
  };

  // Key frame labels: frame 1, each window start/end, frame TOTAL
  const keyFrameNums = [...new Set([1, ...HIT_WINDOWS.flatMap(w=>[w.start, w.end]), TOTAL])].sort((a,b)=>a-b);

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
      {/* Header: frame counter + active hit labels + FPS */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 10px',borderBottom:'1px solid var(--border)',gap:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex',alignItems:'baseline',gap:5}}>
            <span style={{fontFamily:'var(--font-data)',fontSize:30,fontWeight:600,color:'var(--text)',lineHeight:1}}>{frame}</span>
            <span style={{fontFamily:'var(--font-data)',fontSize:12,color:'var(--text3)'}}>/ {TOTAL}</span>
          </div>
          {/* Active hit badges */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {activeWindows.length === 0
              ? <span style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--font-data)'}}>no hitbox</span>
              : activeWindows.map((w,i)=>(
                <span key={i} style={{fontSize:11,fontWeight:600,padding:'3px 8px',borderRadius:5,
                  background: w.color+'22', border:`1px solid ${w.color}55`, color: w.color,
                  fontFamily:'var(--font-data)',whiteSpace:'nowrap'}}>
                  {w.label} · {w.damage}
                </span>
              ))
            }
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
          <span style={{fontSize:11,color:'var(--text3)',marginRight:2}}>FPS</span>
          {[4,8,12,24].map(f=>(
            <button key={f} onClick={()=>setFps(f)} style={{padding:'3px 7px',borderRadius:5,border:'1px solid',borderColor:fps===f?'var(--accent)':'var(--border)',background:fps===f?'var(--accent-dim)':'transparent',color:fps===f?'var(--text)':'var(--text3)',fontSize:12,fontFamily:'var(--font-data)',cursor:'pointer'}}>{f}</button>
          ))}
        </div>
      </div>

      {/* Hit window legend */}
      <div style={{display:'flex',gap:14,padding:'8px 16px',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
        {uniqueWindows.map((w,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontFamily:'var(--font-data)',color:'var(--text3)'}}>
            <span style={{width:10,height:10,borderRadius:2,background:w.color,flexShrink:0}}/>
            <span style={{color:w.color}}>{w.label}</span>
            <span style={{color:'var(--text3)'}}>f{w.start}{w.end!==w.start?`–${w.end}`:''}</span>
          </div>
        ))}
      </div>

      {/* Frame grid */}
      <div style={{padding:'12px 16px 6px'}}>
        <div
          style={{display:'flex',gap:2,flexWrap:'nowrap',userSelect:'none'}}
          onMouseDown={()=>{ dragging.current=true; }}
          onMouseUp={()=>{ dragging.current=false; }}
          onMouseLeave={()=>{ dragging.current=false; }}
        >
          {Array.from({length:TOTAL},(_,i)=>i+1).map(f=>{
            const isCurrent = f === frame;
            const cellStyle = getCellStyle(f);
            return (
              <div
                key={f}
                title={`Frame ${f}`}
                onClick={()=>setFrame(f)}
                onMouseMove={()=>{ if(dragging.current) setFrame(f); }}
                style={{
                  flex:'1 0 0', minWidth:0, flexShrink:1,
                  height: isCurrent ? 32 : 22,
                  borderRadius:2,
                  cursor:'pointer',
                  transition:'height 0.07s',
                  ...cellStyle,
                }}
              />
            );
          })}
        </div>

        {/* Key frame number labels */}
        <div style={{position:'relative',height:18,marginTop:5,fontFamily:'var(--font-data)',fontSize:10}}>
          {keyFrameNums.map(f=>{
            const wins = getWindowsForFrame(f);
            const color = wins.length ? wins[0].color+'cc' : 'var(--text3)';
            const pct = ((f-1)/(TOTAL-1))*100;
            const anchor = f===1?'left':f===TOTAL?'right':'center';
            return (
              <div key={f} onClick={()=>setFrame(f)} style={{
                position:'absolute', left:`${pct}%`, top:0, whiteSpace:'nowrap', color,
                transform: anchor==='center'?'translateX(-50%)':anchor==='right'?'translateX(-100%)':'none',
                cursor:'pointer',
              }}>{f}</div>
            );
          })}
          {/* Current frame label if not already a key label */}
          {!keyFrameNums.includes(frame)&&(
            <div style={{position:'absolute',left:`${((frame-1)/(TOTAL-1))*100}%`,top:0,transform:'translateX(-50%)',color:'white',fontWeight:700,whiteSpace:'nowrap',pointerEvents:'none'}}>{frame}</div>
          )}
        </div>
      </div>

      {/* Controls */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'10px 16px 14px'}}>
        <button onClick={()=>setFrame(1)} title="Go to start" style={{width:32,height:32,borderRadius:7,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button onClick={()=>setFrame(f=>Math.max(1,f-1))} title="Prev frame (←)" style={{width:36,height:36,borderRadius:8,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button onClick={()=>setPlaying(p=>!p)} title="Play/Pause (Space)" style={{width:44,height:44,borderRadius:10,border:'none',background:'var(--accent)',color:'white',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px oklch(63% 0.19 22 / 0.35)',cursor:'pointer'}}>
          {playing
            ? <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
            : <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
          }
        </button>
        <button onClick={()=>setFrame(f=>Math.min(TOTAL,f+1))} title="Next frame (→)" style={{width:36,height:36,borderRadius:8,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button onClick={()=>setFrame(TOTAL)} title="Go to end" style={{width:32,height:32,borderRadius:7,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="5 4 15 12 5 20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
        <span style={{marginLeft:8,fontSize:11,color:'var(--text3)',fontFamily:'var(--font-data)'}}>← → or drag</span>
      </div>
    </div>
  );
}

// ── Hitbox Viewer ────────────────────────────────────────────────────────────
function HitboxViewer({frame, setFrame, playing, setPlaying, fps, setFps}) {
  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => {
      setFrame(f => { if (f >= TOTAL) { setPlaying(false); return 1; } return f+1; });
    }, 1000/fps);
    return () => clearInterval(id);
  }, [playing, fps, setFrame, setPlaying]);

  const activeWins = getWindowsForFrame(frame);
  const framePhase = activeWins.length > 0 ? 'active' : 'inactive';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* Viewer */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:12,fontWeight:500,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.07em'}}>Hitbox Viewer</span>
          <button style={{padding:'5px 12px',borderRadius:7,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text2)',fontSize:12,display:'flex',alignItems:'center',gap:6}}>

// ── Hitboxes Table ───────────────────────────────────────────────────────────
function HitboxesTable({tableMode}) {
  const [expanded, setExpanded] = useState({});
  const [showAll, setShowAll] = useState(tableMode==='full');

  const focusCols = ['Damage','Angle','Base KB','KB Growth','Effect','Shield'];
  const allCols = ['Damage','Angle','Base KB','KB Growth','Set KB','Effect','Hitlag (A)','Hitlag (D)','Shield'];
  const cols = showAll ? allCols : focusCols;

  const getValue = (hb, col) => {
    const map = {'Damage':hb.damage,'Angle':hb.angle,'Base KB':hb.bkb,'KB Growth':hb.kbg,'Set KB':hb.setkb,'Effect':hb.effect,'Hitlag (A)':hb.hitlagA,'Hitlag (D)':hb.hitlagD,'Shield':hb.shield};
    return map[col] ?? '—';
  };

  const toggleGroup = (g) => setExpanded(e=>({...e,[g]:!e[g]}));

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text3)'}}>Hitboxes</span>
        <button onClick={()=>setShowAll(s=>!s)} style={{padding:'4px 10px',borderRadius:6,border:'1px solid var(--border2)',background:'var(--surface2)',color:'var(--text2)',fontSize:11,cursor:'pointer'}}>
          {showAll ? 'Show less' : 'Show all columns'}
        </button>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'var(--font-data)',fontSize:12}}>
          <thead>
            <tr style={{background:'var(--surface2)'}}>
              <th style={{padding:'8px 16px',textAlign:'left',color:'var(--text3)',fontWeight:500,fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',whiteSpace:'nowrap',borderBottom:'1px solid var(--border)'}}>Hitbox</th>
              {cols.map(c=>(
                <th key={c} style={{padding:'8px 12px',textAlign:'right',color:'var(--text3)',fontWeight:500,fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',whiteSpace:'nowrap',borderBottom:'1px solid var(--border)'}}>{c}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {GROUPS.map(g => {
              const rows = HITBOXES.filter(h=>h.group===g);
              const isOpen = expanded[g]!==false;
              return (
                <React.Fragment key={g}>
                  <tr onClick={()=>toggleGroup(g)} style={{cursor:'pointer',background:'var(--surface2)',borderTop:'1px solid var(--border)'}}>
                    <td colSpan={cols.length+1} style={{padding:'6px 16px',color:'var(--text2)',fontSize:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{color:'var(--text3)',fontSize:10,transition:'transform 0.15s',display:'inline-block',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                        <span style={{fontWeight:600,letterSpacing:'0.04em'}}>{GROUP_LABELS[g]}</span>
                        <span style={{color:'var(--text3)',fontSize:11}}>{rows.length} hitbox{rows.length>1?'es':''}</span>
                      </div>
                    </td>
                  </tr>
                  {isOpen && rows.map((hb,i)=>(
                    <tr key={hb.id+i} style={{borderTop:'1px solid var(--border)',background:i%2?'transparent':'var(--accent-glow)'}}>
                      <td style={{padding:'8px 16px',whiteSpace:'nowrap'}}>
                        <div style={{display:'flex',alignItems:'center',gap:7}}>
                          {hb.color&&<span style={{width:10,height:10,borderRadius:3,background:hb.color,flexShrink:0}}/>}
                          <span style={{color:'var(--text2)'}}>{hb.label}</span>
                        </div>
                      </td>
                      {cols.map(c=>{
                        const v = getValue(hb,c);
                        const isDmg = c==='Damage';
                        const isAngle = c==='Angle' && v===361;
                        return (
                          <td key={c} style={{padding:'8px 12px',textAlign:'right',color: isDmg?'var(--text)':isAngle?'var(--teal)':'var(--text2)',fontWeight:isDmg?600:400}}>
                            {isAngle?<span title="Sakurai angle" style={{color:'var(--teal)'}}>↻</span>:null}{v}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Knockdown Section ────────────────────────────────────────────────────────
function KnockdownSection() {
  const [tab, setTab] = useState('slash');
  const [sub, setSub] = useState('id1');
  const tabs = ['slash','late','fthrow','fthrow_hit','bthrow'];
  const chars = CHARACTERS.slice(0,12);
  const pcts = chars.map(()=>({asdi:Math.random()<0.5?'0%':`${Math.floor(Math.random()*5)*5}%`,cc:Math.random()<0.3?'0%':`${20+Math.floor(Math.random()*8)*1}%`}));

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text3)',marginBottom:6}}>Knockdown Thresholds</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>Indicates when this move starts knocking down. Separate tables for Crouch Cancel.</div>
      </div>
      {/* Hitbox tabs */}
      <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>{setTab(t);setSub('id1');}} style={{padding:'8px 14px',border:'none',borderBottom:`2px solid ${tab===t?'var(--accent)':'transparent'}`,background:'transparent',color:tab===t?'var(--text)':'var(--text3)',fontSize:12,fontWeight:tab===t?600:400,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'var(--font-data)'}}>{t}</button>
        ))}
      </div>
      {/* Sub-hitbox select */}
      {tab==='slash'&&(
        <div style={{display:'flex',gap:4,padding:'8px 16px',borderBottom:'1px solid var(--border)'}}>
          {['id1','id2'].map(s=>(
            <button key={s} onClick={()=>setSub(s)} style={{padding:'4px 12px',borderRadius:6,border:'1px solid',borderColor:sub===s?'var(--accent)':'var(--border2)',background:sub===s?'var(--accent-dim)':'transparent',color:sub===s?'var(--text)':'var(--text3)',fontSize:12,fontFamily:'var(--font-data)',cursor:'pointer'}}>{s}</button>
          ))}
        </div>
      )}
      {/* Table */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
        {['ASDI Down','Crouch Cancel'].map((section,si)=>(
          <div key={section} style={{borderRight:si===0?'1px solid var(--border)':'none',padding:'12px'}}>
            <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text3)',marginBottom:8}}>{section}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:2}}>
              {chars.map((c,i)=>(
                <div key={c.id} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 6px',borderRadius:5,background:'var(--surface2)'}}>
                  <span style={{width:18,height:18,borderRadius:'50%',background:c.color+'22',border:`1px solid ${c.color}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:c.color,flexShrink:0}}>{c.name[0]}</span>
                  <span style={{fontFamily:'var(--font-data)',fontSize:11,color: (si===0?pcts[i].asdi:pcts[i].cc)==='0%'?'var(--text3)':'var(--text)'}}>{si===0?pcts[i].asdi:pcts[i].cc}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Tweaks Panel ─────────────────────────────────────────────────────────────

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [frame, setFrame] = useState(47);
  const [playing, setPlaying] = useState(false);
  const [fps, setFps] = useState(12);

  useEffect(() => {
    const handleMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handleMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handleMsg);
  }, []);

  useEffect(() => {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks},'*');
  }, [tweaks]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <TopBar/>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <Sidebar mode={tweaks.sidebarMode}/>
        <main style={{flex:1,overflow:'auto',padding:'24px'}}>
          <div style={{maxWidth:1100,margin:'0 auto'}}>
            <PageHeader/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16,alignItems:'start'}}>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                <HitboxViewer frame={frame} setFrame={setFrame} playing={playing} setPlaying={setPlaying} fps={fps} setFps={setFps}/>
                <AttributesSection/>
                <HitboxesTable tableMode={tweaks.tableMode}/>
                <KnockdownSection/>
              </div>
              <div style={{position:'sticky',top:16}}>
                <SummaryPanel/>
              </div>
            </div>
          </div>
        </main>
      </div>
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
